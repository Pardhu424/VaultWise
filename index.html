<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>VaultWise</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>VaultWise</h1>
  <p>AI-powered career guidance platform</p>

  <form id="careerForm">

  <label>Upload Resume (PDF/DOC)</label><br>
  <input type="file" accept=".pdf,.doc,.docx"><br><br>

  <input type="text" id="skills" placeholder="Enter skills (comma separated)" required>
  <input type="text" id="interests" placeholder="Enter interests">

  <button type="submit">Get Recommendations</button>
  </form>


  <h3>Job Recommendations</h3>
  <ul id="jobResults"></ul>

  <h3>Course Recommendations</h3>
  <ul id="courseResults"></ul>

  <script src="main.js"></script>

</body>
</html>
